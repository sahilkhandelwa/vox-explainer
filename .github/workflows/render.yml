name: Render Vox Explainer

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Asset version'
        required: true
        default: 'svg'
        type: choice
        options:
          - svg
          - editorial
          - streaming

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      VERSION: ${{ github.event.inputs.version || 'svg' }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libnss3 libatk-bridge2.0-0 libgtk-3-0

      - name: Install npm deps
        run: npm ci

      - name: Generate missing TTS audio via Gemini
        run: |
          node scripts/quick-tts.mjs 2>&1 || echo "TTS fill complete or quota hit"

      - name: Refresh timeline and manifest
        run: |
          ls public/audio/vo-*.wav | sed 's|.*/vo-||;s|\.wav$||' | sort |
            python3 -c "import json,sys;print(json.dumps({'scenes':[l.strip() for l in sys.stdin if l.strip()]},indent=2))" \
            > src/vo-manifest.json
          node -e "
            const f=require('fs'),tl=JSON.parse(f.readFileSync('src/timeline.json','utf8'));
            const scenes=JSON.parse(f.readFileSync('src/vo-manifest.json','utf8')).scenes;
            for (const s of tl.scenes) {
              const p='public/audio/vo-'+s.id+'.wav';
              if (f.existsSync(p)) {
                const {execSync}=require('child_process');
                s.durationSec=parseFloat(execSync('ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 \"'+p+'\"').toString().trim());
              }
            }
            let acc=0;
            for (const s of tl.scenes) { s.startSec=acc; acc+=s.durationSec; s.endSec=acc; }
            f.writeFileSync('src/timeline.json',JSON.stringify(tl,null,2));
            console.log('Updated timeline, total='+acc+'s');
          "

      - name: Render (SVG)
        if: ${{ env.VERSION == 'svg' }}
        run: npx remotion render src/Index.tsx VoxMaster out/result.mp4 --codec=h264 --jpeg-quality=80 --concurrency=2

      - name: Render (Editorial)
        if: ${{ env.VERSION == 'editorial' }}
        run: |
          npx remotion still src/IndexEditorial.tsx VoxEditorialMaster out-v2/validation-frame.png --frame=450
          node scripts/validate-frame.mjs || echo "Validation warning (non-fatal)"
          npx remotion render src/IndexEditorial.tsx VoxEditorialMaster out/result_v2.mp4 --codec=h264 --jpeg-quality=80 --concurrency=2

      - name: Render (Streaming)
        if: ${{ env.VERSION == 'streaming' }}
        run: |
          npx remotion render src/IndexStreaming.tsx VoxStreamingMaster out/result.mp4 --codec=h264 --jpeg-quality=80 --concurrency=2

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vox-explainer-${{ env.VERSION }}-video
          path: |
            out/result.mp4
            out/result_v2.mp4
          compression-level: 0
